name: Deploy to Firebase Hosting on PR and merge

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build_and_preview:
    if: "${{ github.event_name == 'pull_request' }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build
      - run: npm --prefix functions ci
      - run: npm --prefix functions run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_HUMAN_PARTNER }}"
          projectId: humanpartner-mall

  build_and_deploy:
    if: "${{ github.event_name == 'push' }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build
      - run: npm --prefix functions ci
      - run: npm --prefix functions run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_HUMAN_PARTNER }}"
          projectId: humanpartner-mall
          channelId: live
